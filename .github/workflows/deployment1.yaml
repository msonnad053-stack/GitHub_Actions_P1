name: Deployment1
on: push
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: get code
        uses: actions/checkout@v7
      - name: install dependencies
        run: npm ci
      - name: Lint
        run: npm run Lint
      - name: Test code
        run: npm run test
      - name: build code
        run: npm run build
      - name: Deploy code
        run: echo " Deploying ..."    